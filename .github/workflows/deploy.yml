# Pull pre-built images and restart Docker on all MIG VMs.
#
# Manually triggered only — go to GitHub Actions → "Deploy to GCP" → "Run workflow".
# Does NOT destroy/recreate VMs. Just SSHs into each running VM via IAP,
# pulls the latest images from Artifact Registry, and restarts containers.
#
# Prerequisites (one-time GCP setup — same as build.yml):
#   1. Workload Identity Federation pool + GitHub OIDC provider
#   2. sa-dpi-app-prod granted workloadIdentityUser for this repo
#   3. GitHub secrets: GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
#   4. sa-dpi-app-prod needs roles/iap.tunnelResourceAccessor + roles/compute.instanceAdmin.v1

name: Deploy to GCP

on:
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Pull and restart on all MIG instances
        run: |
          set -euo pipefail

          INSTANCES=$(gcloud compute instance-groups managed list-instances dpi-mig \
            --region=asia-south1 \
            --project=proj-dpi-shared \
            --format='csv[no-heading](instance,zone)')

          if [ -z "$INSTANCES" ]; then
            echo "No instances found in MIG dpi-mig"
            exit 1
          fi

          DEPLOY_CMD="sudo bash -c 'cd /opt/tanuh-dpi && gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet && docker compose pull && docker compose up -d --remove-orphans && echo Deploy_complete'"

          FAILED=0
          while IFS=',' read -r NAME ZONE; do
            ZONE_SHORT=$(basename "$ZONE")
            echo "--- Deploying to $NAME ($ZONE_SHORT) ---"
            if gcloud compute ssh "$NAME" \
              --zone="$ZONE_SHORT" \
              --project=proj-dpi-shared \
              --tunnel-through-iap \
              --command="$DEPLOY_CMD"; then
              echo "Done: $NAME"
            else
              echo "FAILED: $NAME"
              FAILED=1
            fi
          done <<< "$INSTANCES"

          if [ "$FAILED" -eq 1 ]; then
            echo "Some instances failed to deploy"
            exit 1
          fi
          echo "All instances updated successfully"
